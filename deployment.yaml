apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-demo
  template:
    metadata:
      labels:
        app: python-demo
    spec:
      containers:
      - name: python-demo
        image: dnvprdsis17@gmail.com/python-demo:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: python-demo-service
spec:
  type: NodePort
  selector:
    app: python-demo
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30081